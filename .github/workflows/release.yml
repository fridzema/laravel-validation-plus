name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          fetch_all_tags: true

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Update CHANGELOG
        if: steps.tag.outputs.new_tag
        env:
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
          CHANGELOG_BODY: ${{ steps.tag.outputs.changelog }}
        run: |
          DATE=$(date +%Y-%m-%d)

          {
            echo "# Changelog"
            echo ""
            echo "All notable changes to \`laravel-validation-plus\` will be documented in this file."
            echo ""
            echo "## ${NEW_VERSION} - ${DATE}"
            echo ""
            echo "${CHANGELOG_BODY}"
            echo ""
            # Append previous entries (skip the header lines from old file)
            if [ -f CHANGELOG.md ]; then
              tail -n +4 CHANGELOG.md
            fi
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit CHANGELOG
        if: steps.tag.outputs.new_tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: update CHANGELOG for ${NEW_VERSION} [skip ci]"
          git push
        env:
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
